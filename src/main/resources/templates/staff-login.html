<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>スタッフログイン | チームBe不動産</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/staff-login.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="staff">
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

  <main id="contents" class="login-wrap">
    <h2>スタッフログイン</h2>

    <p class="hint">
      ※学習用の簡易ログインです（固定ID/固定PWでログインします）。
    </p>

    <div class="msg-error" th:if="${error}" th:text="${error}"></div>

    <div class="login-card">
      <form th:action="@{/staff/login}" method="post">
        <div class="form-row">
          <label for="id">ID：「staff」</label>
          <input id="id" name="id" type="text" autocomplete="username" required>
        </div>

        <div class="form-row">
          <label for="pw">パスワード：「pass1234」</label>
          <input id="pw" name="pw" type="password" autocomplete="current-password" required>
        </div>

        <div class="form-actions">
          <a th:href="@{/staff/blog(page=1)}">← ブログ一覧へ</a>
          <button type="submit">ログイン</button>
        </div>
      </form>
    </div>

    <p class="hint login-note-secondary">
      ※本番運用では Spring Security などの認証機構を利用するのが一般的です。
    </p>
  </main>

  <footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>
</body>
</html>
