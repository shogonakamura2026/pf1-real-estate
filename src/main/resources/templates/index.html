<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>チームBe不動産</title>

  <!-- ===============================
       共通CSS
       - common.css       : 基本設定
       - layout.css       : 全体レイアウト
       - components.css   : 共通UI部品
       - index.css        : index本体（Hero / Topics など）
       - index-features.css : 機能紹介（Feature）専用
       - responsive.css   : 全体のSP補助
  ================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/index.css}">
  <link rel="stylesheet" th:href="@{/css/page/index-features.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="home">
  <!-- ===============================
       共通ヘッダー
  ================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

  <main class="container">

    <!-- ===============================
         Hero（スライドショー）
         - slideshow.js で画像を切り替える
         - キャッチ部分は物件一覧への導線
    ================================== -->
    <section class="hero" aria-label="トップスライドショー">
      <div class="hero-slider" id="heroSlider">
        <img class="is-active" th:src="@{/images/chintai/house1.jpg}" alt="物件イメージ1">
        <img th:src="@{/images/chintai/house2.jpg}" alt="物件イメージ2">
        <img th:src="@{/images/chintai/house3.jpg}" alt="物件イメージ3">

        <!-- キャッチ：クリックで物件一覧へ -->
        <a class="hero-caption" th:href="@{/properties}" aria-label="物件一覧へ">
          <h2>理想のマイホーム探し</h2>
          <p>まずはこちら。素敵な物件がきっと見つかる！</p>
        </a>
      </div>

      <!-- CTAボタン -->
      <div class="cta-row">
        <a class="btn primary" th:href="@{/properties}">物件一覧を見る</a>
        <a class="btn pink" th:href="@{/contact}">相談・お問い合わせ</a>
      </div>
    </section>

    <!-- ===============================
         機能紹介（Feature）
         ※ index 専用だが長くなってきたため fragment 化
         ※ Featureカード一覧 + モーダル本体は
            fragments/index-features.html 側で管理する
    ================================== -->
    <div th:replace="~{fragments/index-features :: indexFeatures}"></div>


  </main>

  <div id="footer-anchor"></div>

  <!-- ===============================
       Contactフロート
  ================================== -->
  <div th:replace="~{fragments/contact-float :: contactFloat}"></div>

  <!-- ===============================
       共通フッター
  ================================== -->
  <footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

  <!-- ===============================
       共通Cookie同意
  ================================== -->
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

  <!-- ===============================
       JS呼び出し
       - slideshow.js   : Heroスライドショー
       - index-modal.js : Featureモーダル
  ================================== -->
  <script th:src="@{/js/contact-float.js}"></script>
  <script th:src="@{/js/slideshow.js}"></script>
  <script th:src="@{/js/index-modal.js}"></script>
</body>
</html>
