<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>閲覧履歴 | チームb不動産</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">

  <style>
    .container{ max-width:1100px; margin:0 auto; padding:24px 16px; }
    .header-row{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .page-title{ margin:0; font-size:22px; font-weight:900; color:#0f172a; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:12px; border:1px solid #cdd6e4;
      background:#fff; color:#1f2a44; font-weight:700; cursor:pointer; text-decoration:none;
      line-height: 1;
      white-space: nowrap;
    }
    .btn.outline{	background: #e0f2fe; border-color: #7dd3fc; color: #075985; }
    .btn.pink{ background:#fce7f3; border-color:#f9a8d4; color:#9d174d; }
    .btn.danger{ background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
    .btn.small{ padding:8px 10px; border-radius:10px; font-size:13px; }

    .empty{
      margin-top:16px; padding:14px; border:1px solid #e5e7eb; border-radius:12px;
      background:#fff; color:#334155; font-weight:700;
    }

    .grid{ margin-top:16px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .card{ background:#fff; border:1px solid #e5e7eb; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .thumb{ display:block; background:#f1f5f9; }
    .thumb img{ width:100%; height:160px; object-fit:cover; display:block; }

    .body{ padding:12px; display:flex; flex-direction:column; gap:8px; }
    .title{ font-weight:900; color:#0f172a; line-height:1.3; }
    .meta{ color:#64748b; font-weight:700; font-size:13px; }
    .price{ font-weight:900; color:#0f172a; }

    .actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }

    @media (max-width: 860px){
      .grid{ grid-template-columns:1fr; }
      .thumb img{ height:180px; }
    }
  </style>
</head>

<body>
<header id="top">
  <h1>
    不動産のチームBe
    <a th:href="@{/}">
      <img th:src="@{/images/logo.png}" alt="チームb不動産">
    </a>
  </h1>
</header>

<nav>
  <ul>
    <li id="nav_properties"><a th:href="@{/properties}">物件一覧</a></li>
    <li id="nav_staff"><a th:href="@{/staff/blog(page=1)}">社員のブログ</a></li>
    <li id="nav_about"><a th:href="@{/about}">会社概要</a></li>
    <li id="nav_contact"><a th:href="@{/contact}">お問い合わせ</a></li>
  </ul>
</nav>

<nav class="floating-nav" aria-label="クイックナビ">
  <a class="nav-chip" th:href="@{/properties}">物件一覧</a>
  <a class="nav-chip" th:href="@{/favorites}">お気に入り</a>
  <a class="nav-chip" th:href="@{/history}">履歴</a>
</nav>

<main class="container">

  <div class="header-row">
    <h2 class="page-title">閲覧履歴</h2>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn outline" th:href="@{/properties}">物件一覧へ</a>
      <button class="btn danger" type="button" id="clearHistoryBtn">履歴を全削除</button>
    </div>
  </div>

  <div class="empty" id="emptyBox" style="display:none;">
    まだ閲覧履歴がありません。物件を見るとここに追加されます。
  </div>

  <section class="grid" id="historyGrid"></section>

</main>

<footer>
  <p id="pagetop"><a href="#top">ページの先頭へ戻る</a></p>
  <address>沖縄県那覇市X-X-X 電話 098-XXX-XXX 営業時間 9:00～17:00(休業日：月曜日、年末年始、旧盆)</address>
  <p id="copyright"><small>Copyright 2026 All rights reserved.</small></p>
</footer>

<script>
  // ==========================================
  // localStorage keys
  // ==========================================
  const HISTORY_KEY = "history";
  const FAV_KEY = "favorites";

  // ==========================================
  // 共通：安全に読み込む（壊れてても落ちない）
  // ==========================================
  function loadJsonArray(key){
    try { return JSON.parse(localStorage.getItem(key) || "[]"); }
    catch(e){ return []; }
  }

  function saveJsonArray(key, list){
    localStorage.setItem(key, JSON.stringify(list));
  }

  // ==========================================
  // XSS対策：最小限（表示文字列をHTMLエスケープ）
  // ==========================================
  function escapeHtml(v){
    return String(v ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  // ==========================================
  // お気に入り：判定/表示/トグル
  // ==========================================
  function isFavorite(favs, id){
    return favs.some(x => Number(x.id) === Number(id));
  }

  function updateFavBtnText(btn, favs){
    const id = Number(btn.dataset.id);
    btn.textContent = isFavorite(favs, id)
      ? "お気に入りから削除"
      : "お気に入りに追加";
  }

  function toggleFavoriteByBtn(btn){
    const id = Number(btn.dataset.id);

    // 今のfavoritesを読み直す（他ページで変わっててもOK）
    const favs = loadJsonArray(FAV_KEY);

    const idx = favs.findIndex(x => Number(x.id) === id);
    if (idx !== -1) {
      // 削除
      favs.splice(idx, 1);
    } else {
      // 追加（履歴カードの data-* を使って保存）
      favs.push({
        id: id,
        title: btn.dataset.title || "",
        price: Number(btn.dataset.price || 0),
        layout: btn.dataset.layout || "",
        imageUrl: btn.dataset.image || ""
      });
    }

    saveJsonArray(FAV_KEY, favs);

    // 同ページ内の fav-btn を全部更新
    document.querySelectorAll(".fav-btn").forEach(b => updateFavBtnText(b, favs));
  }

  // ==========================================
  // 画面描画：履歴カードを作る（ここで fav-btn も出す）
  // ==========================================
  function render(){
    const grid = document.getElementById("historyGrid");
    const empty = document.getElementById("emptyBox");

    const history = loadJsonArray(HISTORY_KEY);
    const favs = loadJsonArray(FAV_KEY);

    grid.innerHTML = "";

    if (!history.length){
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    history.forEach(item => {
      const id = Number(item.id);

      // favorites.html と同じ想定：/images/ + imageUrl
      const imgSrc = "/images/" + (item.imageUrl || "");

      const card = document.createElement("article");
      card.className = "card";

      // ✅ fav-btn をここで出す（data-* に必要情報を全部入れる）
      card.innerHTML = `
        <a class="thumb" href="/properties/${id}">
          <img src="${imgSrc}" alt="物件画像">
        </a>

        <div class="body">
          <div class="title">${escapeHtml(item.title || "")}</div>
          <div class="price">¥ ${escapeHtml(item.price ?? "")} / 月</div>
          <div class="meta">${escapeHtml(item.layout || "")}</div>

          <div class="actions">
            <a class="btn small outline" href="/properties/${id}">物件詳細</a>

            <button class="btn small pink fav-btn" type="button"
              data-id="${id}"
              data-title="${escapeHtml(item.title || "")}"
              data-price="${escapeHtml(item.price ?? "")}"
              data-layout="${escapeHtml(item.layout || "")}"
              data-image="${escapeHtml(item.imageUrl || "")}">
              お気に入りに追加
            </button>

            <button class="btn small danger history-del-btn" type="button" data-id="${id}">
              履歴を削除
            </button>
          </div>
        </div>
      `;

      grid.appendChild(card);
    });

    // ✅ 初期表示：favorites状態に合わせてボタン文言を更新
    document.querySelectorAll(".fav-btn").forEach(btn => updateFavBtnText(btn, favs));
  }

  // ==========================================
  // クリック処理（イベント委譲）
  // ==========================================
  document.addEventListener("click", function(e){

    // お気に入りトグル
    const favBtn = e.target.closest(".fav-btn");
    if (favBtn) {
      toggleFavoriteByBtn(favBtn);
      return;
    }

    // 履歴の個別削除
    const delBtn = e.target.closest(".history-del-btn");
    if (delBtn) {
      const id = Number(delBtn.dataset.id);
      const next = loadJsonArray(HISTORY_KEY).filter(x => Number(x.id) !== id);
      saveJsonArray(HISTORY_KEY, next);
      render();
      return;
    }
  });

  // 履歴の全削除
  document.getElementById("clearHistoryBtn").addEventListener("click", function(){
    localStorage.removeItem(HISTORY_KEY);
    render();
  });

  // 初回描画
  document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
