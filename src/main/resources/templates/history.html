<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>履歴 | チームb不動産</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">

  <!-- ===============================
       履歴ページ専用スタイル（最小）
       ※favoritesと同じ見た目に寄せる
  ================================== -->
  <style>
    .container{ max-width: 1100px; margin: 24px auto; padding: 0 16px; }

    .page-head{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .page-head h2{ margin: 0; }

    .actions{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #cdd6e4;
      background: #fff;
      color: #1f2a44;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
    }
    .btn.primary{
      background: #e0f2fe;
      border-color: #7dd3fc;
      color: #075985;
    }
    .btn.danger{
      background: #fee2e2;
      border-color: #fecaca;
      color: #991b1b;
    }
    .btn.outline{
      background: #fff;
      border-color: #cdd6e4;
      color: #1f2a44;
    }

    .empty{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      color:#334155;
    }

    .note{
      color:#64748b;
      font-size: 14px;
      margin-top: 4px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 14px;
    }
    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius: 12px;
      overflow:hidden;
      display:flex;
      flex-direction: column;
      min-height: 100%;
    }
    .card img{
      width:100%;
      height: 150px;
      object-fit: cover;
      display:block;
      background:#f1f5f9;
    }
    .card-body{
      padding: 12px;
      display:flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .title{
      font-weight: 900;
      color:#0f172a;
    }
    .meta{
      color:#64748b;
      font-size: 14px;
    }
    .card-actions{
      margin-top:auto;
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    @media (max-width: 860px){
      .grid{ grid-template-columns: 1fr; }
      .card img{ height: 180px; }
    }
  </style>
</head>

<body>
<!-- ===============================
     ヘッダー
================================ -->
<header id="top">
  <h1>
    不動産のチームBe
    <a th:href="@{/}">
      <img th:src="@{/images/logo.png}" alt="チームb不動産">
    </a>
  </h1>
</header>

<!-- ===============================
     グローバルナビ
================================ -->
<nav>
  <ul>
    <li id="nav_properties"><a th:href="@{/properties}">物件一覧</a></li>
    <li id="nav_staff"><a th:href="@{/staff/blog(page=1)}">社員のブログ</a></li>
    <li id="nav_about"><a th:href="@{/about}">会社概要</a></li>
    <li id="nav_contact"><a th:href="@{/contact}">お問い合わせ</a></li>
  </ul>
</nav>

<!-- ===============================
     右上ポップ追従ナビ
================================ -->
<nav class="floating-nav" aria-label="クイックナビ">
  <a class="nav-chip" th:href="@{/properties}">物件一覧</a>
  <a class="nav-chip" th:href="@{/favorites}">お気に入り</a>
  <a class="nav-chip" th:href="@{/history}">履歴</a>
</nav>

<!-- ===============================
     メイン
================================ -->
<main class="container">
  <div class="page-head">
    <div>
      <h2>履歴</h2>
      <div class="note">※直近10件まで保存します（同じ物件は最新に更新）。</div>
    </div>

    <div class="actions">
      <a class="btn primary" th:href="@{/properties}">物件一覧へ</a>
      <button class="btn danger" type="button" onclick="clearAll()">全削除</button>
    </div>
  </div>

  <div id="emptyBox" class="empty" style="display:none;">
    履歴はまだありません。物件の詳細ページを開くと自動で追加されます。
  </div>

  <section id="grid" class="grid" aria-label="履歴一覧"></section>
</main>

<!-- ===============================
     フッター
================================ -->
<footer>
  <p id="pagetop"><a href="#top">ページの先頭へ戻る</a></p>
  <address>沖縄県那覇市X-X-X 電話 098-XXX-XXX 営業時間 9:00～17:00(休業日：月曜日、年末年始、旧盆)</address>
  <p id="copyright"><small>Copyright 2026 All rights reserved.</small></p>
</footer>

<!-- ===============================
     履歴（localStorage）制御
================================ -->
<script>
  const KEY = "history";
  const MAX = 10;

  // ページ初期表示
  document.addEventListener("DOMContentLoaded", render);

  function getList() {
    try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
    catch (e) { return []; }
  }

  function setList(list) {
    // 念のため最大件数を保証
    localStorage.setItem(KEY, JSON.stringify(list.slice(0, MAX)));
  }

  function render() {
    const list = getList();
    const grid = document.getElementById("grid");
    const emptyBox = document.getElementById("emptyBox");

    grid.innerHTML = "";

    if (!list.length) {
      emptyBox.style.display = "block";
      return;
    }
    emptyBox.style.display = "none";

    for (const item of list) {
      grid.appendChild(createCard(item));
    }
  }

  function createCard(item) {
    const card = document.createElement("article");
    card.className = "card";

    const img = document.createElement("img");
    img.alt = "物件画像";
    img.src = `/images/${item.imageUrl || ""}`;
    card.appendChild(img);

    const body = document.createElement("div");
    body.className = "card-body";

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = item.title || "（タイトル未設定）";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `家賃：${Number(item.price || 0).toLocaleString()}円 / 間取り：${item.layout || "-"}`;

    const actions = document.createElement("div");
    actions.className = "card-actions";

    // 詳細へ
    const detail = document.createElement("a");
    detail.className = "btn primary";
    detail.textContent = "詳細";
    detail.href = `/properties/${Number(item.id)}`;

    // 履歴から削除
    const del = document.createElement("button");
    del.className = "btn danger";
    del.type = "button";
    del.textContent = "削除";
    del.addEventListener("click", () => removeOne(item.id));

    // お気に入りへ追加（履歴から直接追加したい時用）
    const fav = document.createElement("button");
    fav.className = "btn outline";
    fav.type = "button";
    fav.textContent = "お気に入りへ";
    fav.addEventListener("click", () => addToFavorites(item));

    actions.appendChild(detail);
    actions.appendChild(fav);
    actions.appendChild(del);

    body.appendChild(title);
    body.appendChild(meta);
    body.appendChild(actions);

    card.appendChild(body);
    return card;
  }

  function removeOne(id) {
    const list = getList().filter(x => Number(x.id) !== Number(id));
    setList(list);
    render();
  }

  function clearAll() {
    if (!confirm("履歴をすべて削除しますか？")) return;
    localStorage.removeItem(KEY);
    render();
  }

  // ===============================
  // お気に入り追加（履歴→お気に入り）
  // ===============================
  function addToFavorites(item) {
    const favKey = "favorites";
    let favs;

    try { favs = JSON.parse(localStorage.getItem(favKey) || "[]"); }
    catch (e) { favs = []; }

    if (!favs.some(x => Number(x.id) === Number(item.id))) {
      favs.push({
        id: Number(item.id),
        title: item.title || "",
        price: Number(item.price || 0),
        layout: item.layout || "",
        imageUrl: item.imageUrl || ""
      });
      localStorage.setItem(favKey, JSON.stringify(favs));
      alert("お気に入りに追加しました");
    } else {
      alert("すでにお気に入りに入っています");
    }
  }
</script>
</body>
</html>
