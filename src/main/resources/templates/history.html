<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>閲覧履歴 | チームBe不動産</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">

  <!-- =========================================================
       閲覧履歴ページ専用スタイル（UIのみ）
       ---------------------------------------------------------
       ★ favorites.html と構造を合わせる目的
       - グリッド表示（PC:3列 / SP:1列）
       - カード構造：thumb(画像リンク) + body(情報) + actions(ボタン)
       - 画像クリックで詳細へ（favorites と同じ導線）
  ========================================================= -->
  <style>
    .container{ max-width:1100px; margin:0 auto; padding:24px 16px; }

    .header-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .page-title{
      margin:0;
      font-size:22px;
      font-weight:900;
      color:#0f172a;
      line-height:1.2;
    }

    /* 仕様表示（最新10件） */
    .note{
      margin-top:6px;
      color:#64748b;
      font-weight:700;
      font-size:13px;
    }

    /* ---------------------------------------------------------
       ボタン（共通）
       ---------------------------------------------------------
       ・outline: 物件一覧/詳細などの導線
       ・pink:    お気に入りトグル
       ・danger:  削除系
       ・small:   カード内のボタンは小さめ
    --------------------------------------------------------- */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid #cdd6e4;
      background:#fff;
      color:#1f2a44;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      line-height:1;
      white-space:nowrap;
      gap:6px;
    }
    .btn.outline{ background:#e0f2fe; border-color:#7dd3fc; color:#075985; }
    .btn.pink{ background:#fce7f3; border-color:#f9a8d4; color:#9d174d; }
    .btn.danger{ background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
    .btn.small{ padding:8px 10px; border-radius:10px; font-size:13px; }

    .empty{
      margin-top:16px;
      padding:14px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      background:#fff;
      color:#334155;
      font-weight:700;
    }

    /* ---------------------------------------------------------
       グリッド/カード
       ---------------------------------------------------------
       ★ favorites.html と整合性を持たせるため、
       画像は <a class="thumb" href="/properties/{id}"> で包む
    --------------------------------------------------------- */
    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }
    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .thumb{
      display:block;
      background:#f1f5f9;
    }
    .thumb img{
      width:100%;
      height:160px;
      object-fit:cover;
      display:block;
    }

    .body{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1;
    }
    .title{ font-weight:900; color:#0f172a; line-height:1.3; }
    .price{ font-weight:900; color:#0f172a; }
    .meta{ color:#64748b; font-weight:700; font-size:13px; }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    @media (max-width: 860px){
      .grid{ grid-template-columns:1fr; }
      .thumb img{ height:180px; }
    }
  </style>
</head>

<body>
<!-- ===============================
     ヘッダー
================================ -->
<header id="top">
  <h1>
    不動産のチームBe
    <a th:href="@{/}">
      <img th:src="@{/images/logo.png}" alt="チームb不動産">
    </a>
  </h1>
</header>

<!-- ===============================
     グローバルナビ
================================ -->
<nav>
  <ul>
    <li id="nav_properties"><a th:href="@{/properties}">物件一覧</a></li>
    <li id="nav_staff"><a th:href="@{/staff/blog(page=1)}">社員のブログ</a></li>
    <li id="nav_about"><a th:href="@{/about}">会社概要</a></li>
    <li id="nav_contact"><a th:href="@{/contact}">お問い合わせ</a></li>
  </ul>
</nav>

<!-- ===============================
     右上ポップ追従ナビ
================================ -->
<nav class="floating-nav" aria-label="クイックナビ">
  <a class="nav-chip prop" th:href="@{/properties}">物件一覧</a>
  <a class="nav-chip fav" th:href="@{/favorites}">お気に入り</a>
  <a class="nav-chip hist" th:href="@{/history}">履歴</a>
</nav>

<!-- =========================================================
     メイン
     ---------------------------------------------------------
     役割分離（学習ポイント）
     - 保存（履歴を追加し10件に制限）：本来は物件詳細ページで実施
     - 表示（このページ）：history を読んで描画する
     - 連携（このページ）：favorites を読んでトグルできるようにする
========================================================= -->
<main class="container">

  <div class="header-row">
    <div>
      <h2 class="page-title">閲覧履歴</h2>

      <!-- ✅ 仕様が伝わる「最新10件」表記 -->
      <div class="note">
        ※閲覧履歴は最新10件まで保存されます（古い履歴から自動削除）
      </div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <a class="btn outline" th:href="@{/properties}">物件一覧へ</a>
      <button class="btn danger" type="button" id="clearHistoryBtn">履歴を全削除</button>
    </div>
  </div>

  <div class="empty" id="emptyBox" style="display:none;">
    まだ閲覧履歴がありません。物件を見るとここに追加されます。
  </div>

  <section class="grid" id="historyGrid" aria-label="閲覧履歴一覧"></section>
</main>

<!-- ===============================
     フッター：fragments
================================ -->

<footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

<!-- ===============================
     cookie同意：fragments
================================ -->
<div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

<script>
  // =========================================================
  // localStorage keys
  // ---------------------------------------------------------
  // HISTORY_KEY: 閲覧履歴の保存場所（配列）
  // FAV_KEY:     お気に入りの保存場所（favorites.html と共通）
  // =========================================================
  const HISTORY_KEY = "history";
  const FAV_KEY = "favorites";

  // =========================================================
  // 共通：JSON配列を安全に読み書き
  // ---------------------------------------------------------
  // localStorageは「文字列」保存なので JSON.parse/stringify を使う
  // 壊れたJSONが入っていても画面が落ちないように try/catch
  // =========================================================
  function loadJsonArray(key){
    try { return JSON.parse(localStorage.getItem(key) || "[]"); }
    catch(e){ return []; }
  }

  function saveJsonArray(key, list){
    localStorage.setItem(key, JSON.stringify(list));
  }

  // =========================================================
  // XSS対策：innerHTMLに埋める文字列の最小エスケープ
  // ---------------------------------------------------------
  // favorites.html は createElement + textContent 中心で比較的安全
  // history.html は innerHTML を使うため escapeHtml が重要
  // =========================================================
  function escapeHtml(v){
    return String(v ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  // =========================================================
  // お気に入り判定 / ボタン文言更新
  // =========================================================
  function isFavorite(favs, id){
    return favs.some(x => Number(x.id) === Number(id));
  }

  function updateFavBtnText(btn, favs){
    const id = Number(btn.dataset.id);
    btn.textContent = isFavorite(favs, id)
      ? "お気に入りから削除"
      : "お気に入りに追加";
  }

  // =========================================================
  // お気に入りトグル（追加/削除）
  // ---------------------------------------------------------
  // ★ favorites.html と同じ保存形式に合わせる（整合性）
  // { id, title, price, layout, imageUrl }
  //
  // ★ data-* 属性に必要情報を詰めておき、押したときに保存する
  // =========================================================
  function toggleFavoriteByBtn(btn){
    const id = Number(btn.dataset.id);

    // 他ページで変更されてもズレないよう「押下時に最新を読む」
    const favs = loadJsonArray(FAV_KEY);

    const idx = favs.findIndex(x => Number(x.id) === id);
    if (idx !== -1) {
      // すでにお気に入り → 削除
      favs.splice(idx, 1);
    } else {
      // 未登録 → 追加
      favs.push({
        id: id,
        title: btn.dataset.title || "",
        price: Number(btn.dataset.price || 0),
        layout: btn.dataset.layout || "",
        imageUrl: btn.dataset.image || ""
      });
    }

    saveJsonArray(FAV_KEY, favs);

    // 同ページ内の全 fav-btn を “今の状態” に揃える
    document.querySelectorAll(".fav-btn").forEach(b => updateFavBtnText(b, favs));
  }

  // =========================================================
  // 描画：履歴をカード化して表示
  // ---------------------------------------------------------
  // ・history を読む
  // ・favorites を読む（ボタン文言同期用）
  // ・空なら emptyBox を表示
  //
  // ★「10件制限」は保存側（物件詳細ページ）で担保する設計
  // =========================================================
  function render(){
    const grid = document.getElementById("historyGrid");
    const empty = document.getElementById("emptyBox");

    const history = loadJsonArray(HISTORY_KEY);
    const favs = loadJsonArray(FAV_KEY);

    grid.innerHTML = "";

    if (!history.length){
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    history.forEach(item => {
      const id = Number(item.id);

      // favorites.html と同じ想定：/images/ + imageUrl（ファイル名）
      const imgSrc = "/images/" + (item.imageUrl || "");

      const card = document.createElement("article");
      card.className = "card";

      // ✅ 画像クリックで詳細へ（favorites.html と同じ導線）
      // ✅ fav-btn: data-* に保存用データを詰めておく
      card.innerHTML = `
        <a class="thumb" href="/properties/${id}">
          <img src="${imgSrc}" alt="物件画像">
        </a>

        <div class="body">
          <div class="title">${escapeHtml(item.title || "")}</div>
          <div class="price">¥ ${escapeHtml(item.price ?? "")} / 月</div>
          <div class="meta">${escapeHtml(item.layout || "")}</div>

          <div class="actions">
            <a class="btn small outline" href="/properties/${id}">物件詳細</a>

            <button class="btn small pink fav-btn" type="button"
              data-id="${id}"
              data-title="${escapeHtml(item.title || "")}"
              data-price="${escapeHtml(item.price ?? "")}"
              data-layout="${escapeHtml(item.layout || "")}"
              data-image="${escapeHtml(item.imageUrl || "")}">
              お気に入りに追加
            </button>

            <button class="btn small danger history-del-btn" type="button" data-id="${id}">
              履歴を削除
            </button>
          </div>
        </div>
      `;

      grid.appendChild(card);
    });

    // 初期表示：お気に入り状態に合わせてボタン文言を揃える
    document.querySelectorAll(".fav-btn").forEach(btn => updateFavBtnText(btn, favs));
  }

  // =========================================================
  // クリック処理（イベント委譲）
  // ---------------------------------------------------------
  // innerHTMLで作ったボタンでも確実に拾える
  // =========================================================
  document.addEventListener("click", function(e){

    // お気に入りトグル
    const favBtn = e.target.closest(".fav-btn");
    if (favBtn) {
      toggleFavoriteByBtn(favBtn);
      return;
    }

    // 履歴の個別削除
    const delBtn = e.target.closest(".history-del-btn");
    if (delBtn) {
      const id = Number(delBtn.dataset.id);
      const next = loadJsonArray(HISTORY_KEY).filter(x => Number(x.id) !== id);
      saveJsonArray(HISTORY_KEY, next);
      render();
      return;
    }
  });

  // =========================================================
  // 履歴の全削除
  // =========================================================
  document.getElementById("clearHistoryBtn").addEventListener("click", function(){
    localStorage.removeItem(HISTORY_KEY);
    render();
  });

  // =========================================================
  // 初回描画
  // =========================================================
  document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
