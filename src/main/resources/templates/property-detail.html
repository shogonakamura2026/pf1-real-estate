<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>物件詳細 | チームBe不動産</title>

  <!-- ===============================
    共通CSS
  ================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/property-detail.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">


</head>

<body id="property-detail" class="section-properties">
	<!-- ===============================
	     共通ヘッダー
	================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div> 
  <div th:replace="~{fragments/global-nav :: globalNav}"></div> 
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>


  <!-- =====================================================
       メインコンテンツ
       ===================================================== -->
  
<main class="container">

  <!-- 上：画像＋右側情報/ボタン -->
  <section class="section-card">
    <div class="top2">
      <div class="card">
        <div class="photo">
          <img th:src="@{/images/{img}(img=${property.imageUrl})}"
               src="images/house1.jpg"
               alt="物件写真">
        </div>
      </div>

      <div class="card pad">
        <h2 class="title" th:text="${property.title}">サンプル物件</h2>

        <p class="price">¥ <span th:text="${property.price}">78000</span> / 月</p>

        <div class="meta">
          <div>住所：<span th:text="${property.address}">住所</span></div>
          <div>間取り：<span th:text="${property.layout}">1LDK</span></div>
        </div>

        <div class="buttons">
          <a class="btn primary" th:href="@{/contact}">お問い合わせ</a>

          <!-- ✅ ここが重要：お気に入りトグル用ボタン（class fav-btn に統一） -->
          <button class="btn pink fav-btn" type="button"
                  id="favoriteBtn"
                  th:attr="data-id=${property.id},
                           data-title=${property.title},
                           data-price=${property.price},
                           data-layout=${property.layout},
                           data-image=${property.imageUrl}">
            お気に入りに追加
          </button>

          <a class="btn outline" th:href="@{/properties}">一覧に戻る</a>
        </div>

        <div class="share">
          <div class="share-title">この物件を共有</div>
          <div class="share-row">
            <a class="btn small outline" id="shareLine" target="_blank" rel="noopener">LINE</a>
            <a class="btn small outline" id="shareX" target="_blank" rel="noopener">X</a>
            <a class="btn small outline" id="shareFb" target="_blank" rel="noopener">Facebook</a>
            <button class="btn small outline" type="button" onclick="copyShareUrl()">リンクをコピー</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 詳細テーブル -->
  <section class="card detail pad section-gap">
    <table>
      <tr><th>建物名</th><td th:text="${property.title}"></td></tr>
      <tr><th>家賃</th><td th:text="${property.price}"></td></tr>
      <tr><th>住所</th><td th:text="${property.address}"></td></tr>
      <tr><th>間取り</th><td th:text="${property.layout}"></td></tr>
      <tr><th>面積</th><td><span th:text="${property.floorArea}"></span>㎡</td></tr>
      <tr><th>説明</th><td th:text="${property.description}"></td></tr>
    </table>
  </section>

  <!-- Googleマップ -->
  <section class="card map section-gap">
    <iframe
      loading="lazy"
      th:src="'https://www.google.com/maps?q=' + ${mapLat} + ',' + ${mapLng} + '&z=14&output=embed'">
    </iframe>
  </section>

  <!-- こちらもチェック -->
  <section class="card pad section-gap">
    <div class="section-card">
      <h3 class="rec-title">こちらもチェック（同じエリアの物件）</h3>

      <div class="rec-grid">
        <article class="rec-item" th:each="p : ${recommendations}">
          <a class="rec-photo" th:href="@{/properties/{id}(id=${p.id})}">
            <img th:src="@{/images/{img}(img=${p.imageUrl})}" alt="物件写真">
          </a>

          <div class="rec-body">
            <div class="rec-price">¥ <span th:text="${p.price}"></span> / 月</div>
            <div class="rec-meta"><span th:text="${p.layout}"></span></div>

            <div class="rec-actions">
              <a class="btn primary small" th:href="@{/properties/{id}(id=${p.id})}">詳細</a>

              <!-- ✅ おすすめ側もトグル対応（同じ fav-btn で統一） -->
              <button class="btn pink small fav-btn" type="button"
                      th:attr="data-id=${p.id},
                               data-title=${p.title},
                               data-price=${p.price},
                               data-layout=${p.layout},
                               data-image=${p.imageUrl}">
                お気に入りに追加
              </button>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>

</main>



<!-- Contactフロート -->
<div th:replace="~{fragments/contact-float :: contactFloat}"></div>

  <!-- 共通フッター -->
<footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

  <!-- 共通Cookie同意 -->
<div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

<!-- =======================================================
     JS：お気に入り（トグル）＋履歴＋SNS共有
     ※ fav-btn クラスのボタンは全て「追加/削除の切替」対象になる
======================================================= -->
<script th:inline="javascript">
/*<![CDATA[*/

  // -----------------------------
  // 物件データ（Thymeleaf → JSへ）
  // -----------------------------
  const propertyData = {
    id: /*[[${property.id}]]*/ 0,
    title: /*[[${property.title}]]*/ "",
    price: /*[[${property.price}]]*/ 0,
    layout: /*[[${property.layout}]]*/ "",
    imageUrl: /*[[${property.imageUrl}]]*/ ""
  };

  // ==========================================
  // お気に入り：localStorage トグル 共通ロジック
  // ==========================================
  const FAV_KEY = "favorites";

  // favorites配列を取得（壊れてても落ちない）
  function loadFavorites(){
    try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); }
    catch(e){ return []; }
  }

  // favorites配列を保存
  function saveFavorites(list){
    localStorage.setItem(FAV_KEY, JSON.stringify(list));
  }

  // 指定idが favorites に入ってるか？
  function isFavorite(list, id){
    return list.some(x => Number(x.id) === Number(id));
  }

  // 表示文言を更新（入ってたら「削除」、無ければ「追加」）
  function updateFavButtonText(btn, list){
    const id = Number(btn.dataset.id);
    btn.textContent = isFavorite(list, id)
      ? "お気に入りから削除"
      : "お気に入りに追加";
  }

  // ボタンにクリックイベントを付けて「追加/削除」を切替
  function bindFavButton(btn, list){
    // 初期表示
    updateFavButtonText(btn, list);

    btn.addEventListener("click", function(){
      const id = Number(btn.dataset.id);

      // 既に入ってたら削除、無ければ追加
      const idx = list.findIndex(x => Number(x.id) === id);
      if (idx !== -1) {
        list.splice(idx, 1);
      } else {
        list.push({
          id: id,
          title: btn.dataset.title || "",
          price: Number(btn.dataset.price || 0),
          layout: btn.dataset.layout || "",
          imageUrl: btn.dataset.image || ""
        });
      }

      saveFavorites(list);

      // ✅ ここがミソ：同ページ内の fav-btn を全部更新（詳細＋おすすめ）
      document.querySelectorAll(".fav-btn").forEach(b => updateFavButtonText(b, list));
    });
  }

  // ページ読み込み時に fav-btn を全部トグル化
  document.addEventListener("DOMContentLoaded", function(){
    const list = loadFavorites();
    document.querySelectorAll(".fav-btn").forEach(btn => bindFavButton(btn, list));
  });

  // ======================
  // 履歴：ページ表示時に自動追加
  // ======================
  (function addHistory(){
    const key = "history";
    const max = 10;
    let list;

    try { list = JSON.parse(localStorage.getItem(key) || "[]"); }
    catch(e){ list = []; }

    // 同IDは除外して先頭へ（最新が上）
    const updated = [propertyData, ...list.filter(x => Number(x.id) !== Number(propertyData.id))];
    localStorage.setItem(key, JSON.stringify(updated.slice(0, max)));
  })();

  // ======================
  // SNS共有リンク生成
  // ======================
  (function setupShareLinks(){
    const url = window.location.href;
    const encUrl = encodeURIComponent(url);
    const encTitle = encodeURIComponent(propertyData?.title ?? "");

    const line = document.getElementById("shareLine");
    const x = document.getElementById("shareX");
    const fb = document.getElementById("shareFb");

    if (line) line.href = `https://social-plugins.line.me/lineit/share?url=${encUrl}`;
    if (x) x.href = `https://twitter.com/intent/tweet?url=${encUrl}&text=${encTitle}`;
    if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${encUrl}`;
  })();

  // 共有URLコピー（フォールバックあり）
  function copyShareUrl(){
    const url = window.location.href;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url)
        .then(() => alert("リンクをコピーしました"))
        .catch(() => fallbackCopy(url));
    } else {
      fallbackCopy(url);
    }

    function fallbackCopy(text){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      alert("リンクをコピーしました");
    }
  }

/*]]>*/
</script>


<!-- ===============================
     js呼び出し
================================== -->
<!-- Contactフロートjs -->
<script th:src="@{/js/contact-float.js}"></script>


</body>
</html>
