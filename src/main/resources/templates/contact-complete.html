<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送信完了 | チームBe不動産</title>

  <!-- =====================================================
       共通CSS
       ===================================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/contact-complete.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="contact">

  <!-- =====================================================
       共通ヘッダー / 共通ナビ
       ===================================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>
  
  <!-- =====================================================
       パンくず（layout.css管理）
       ===================================================== -->
  <div id="path">
    <ol>
      <li><a th:href="@{/}">ホーム</a></li>
      <li>お問い合わせ（送信完了）</li>
    </ol>
  </div>

  <!-- =====================================================
       メインコンテンツ
       ===================================================== -->
  <div id="main">
    <article>
      <h1>送信が完了しました</h1>
      <p>
        お問い合わせありがとうございます。<br>
        3営業日以内にご返信いたします。
      </p>
      <a class="btn" th:href="@{/}">トップへ戻る</a>
    </article>
  </div>

  <!-- =====================================================
       共通フッター / Cookie
       ===================================================== -->
  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

</body>
</html>
