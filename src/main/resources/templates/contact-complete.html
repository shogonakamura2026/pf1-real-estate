<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送信完了 | チームBe不動産</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
  <style>
    #main article{
      background:#fff;border:1px solid #e5e7eb;border-radius:12px;
      padding:22px 18px;max-width:900px;margin:0 auto;text-align:center;
    }
    .btn{display:inline-block;margin-top:14px;border:1px solid #111;background:#111;color:#fff;
      padding:10px 14px;border-radius:10px;text-decoration:none;}
  </style>
</head>
<body id="contact-complete">
<header id="top">
  <h1>不動産のチームBe <a th:href="@{/}"><img th:src="@{/images/logo.png}" alt="チームb不動産について"></a></h1>
</header>

<nav>
  <ul>
    <li id="nav_properties"><a th:href="@{/properties}">物件一覧</a></li>
    <li id="nav_staff"><a th:href="@{/staff/blog(page=1)}">社員のブログ</a></li>
    <li id="nav_about"><a th:href="@{/about}">会社概要</a></li>
    <li id="nav_contact"><a th:href="@{/contact}">お問い合わせ</a></li>
  </ul>
</nav>

<div id="main">
  <article>
    <h1>送信が完了しました</h1>
    <p>お問い合わせありがとうございます。<br>3営業日以内にご返信いたします。</p>
    <a class="btn" th:href="@{/}">トップへ戻る</a>
  </article>
</div>

<!-- ===============================
     フッター：fragments
================================ -->

<footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

<!-- ===============================
     cookie同意：fragments
================================ -->
<div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

</body>
</html>
