<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>サイトマップ | チームBe不動産</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">

  <style>
    .doc-wrap{ max-width: 860px; margin: 0 auto; padding: 24px 16px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; }
    .doc-wrap h1{ margin: 0 0 16px; font-size: 22px; }
    .site-links a{ display:inline-block; margin: 6px 0; }
  </style>
</head>
<body>
	
	<!-- ===============================
	     ヘッダー
	================================ -->
	<header id="top">
	  <h1>
	    不動産のチームBe
	    <a th:href="@{/}">
	      <img th:src="@{/images/logo.png}" alt="チームb不動産">
	    </a>
	  </h1>
	</header>

	<!-- ===============================
	     グローバルナビ
	================================ -->
	<nav>
	  <ul>
	    <li id="nav_properties"><a th:href="@{/properties}">物件一覧</a></li>
	    <li id="nav_staff"><a th:href="@{/staff/blog(page=1)}">社員のブログ</a></li>
	    <li id="nav_about"><a th:href="@{/about}">会社概要</a></li>
	    <li id="nav_contact"><a th:href="@{/contact}">お問い合わせ</a></li>
	  </ul>
	</nav>

	<!-- ===============================
	     右上ポップ追従ナビ
	================================ -->
	<nav class="floating-nav" aria-label="クイックナビ">
	  <a class="nav-chip prop" th:href="@{/properties}">物件一覧</a>
	  <a class="nav-chip fav" th:href="@{/favorites}">お気に入り</a>
	  <a class="nav-chip hist" th:href="@{/history}">履歴</a>
	</nav>
	
  <main class="doc-wrap" role="main">
    <h1>サイトマップ</h1>

    <div class="site-links">
      <div><a th:href="@{/}">トップ</a></div>
      <div><a th:href="@{/properties}">物件一覧</a></div>
      <div><a th:href="@{/favorites}">お気に入り</a></div>
      <div><a th:href="@{/history}">閲覧履歴</a></div>
      <div><a th:href="@{/staff/blog}">社員ブログ</a></div>
      <div><a th:href="@{/contact}">お問い合わせ</a></div>

      <hr>

      <div><a th:href="@{/privacy}">プライバシーポリシー</a></div>
      <div><a th:href="@{/external-transmission}">外部送信ポリシー</a></div>
      <div><a th:href="@{/terms}">利用規約</a></div>
      <div><a th:href="@{/listing-apply}">掲載申し込みはこちら</a></div>
    </div>
  </main>
</body>

<!-- ===============================
     フッター：fragments
================================ -->

<footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

<!-- ===============================
     cookie同意：fragments
================================ -->
<div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

</html>
