<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>サイトマップ | チームBe不動産</title>

  <!-- ===============================
    共通CSS
  ================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">

  <!-- docsページ専用CSS -->
  <link rel="stylesheet" th:href="@{/css/page/docs.css}">

  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">


</head>
<body id="docs">
	<!-- ===============================
	     共通ヘッダー
	================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>  
  <div th:replace="~{fragments/global-nav :: globalNav}"></div> 
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

<main class="doc-wrap" role="main">
    <h1>サイトマップ</h1>

    <div class="site-links">
      <div><a th:href="@{/}">トップ</a></div>
      <div><a th:href="@{/properties}">物件一覧</a></div>
      <div><a th:href="@{/favorites}">お気に入り</a></div>
      <div><a th:href="@{/history}">閲覧履歴</a></div>
      <div><a th:href="@{/staff/blog}">社員ブログ</a></div>
      <div><a th:href="@{/contact}">お問い合わせ</a></div>

      <hr>

      <div><a th:href="@{/privacy}">プライバシーポリシー</a></div>
      <div><a th:href="@{/external-transmission}">外部送信ポリシー</a></div>
      <div><a th:href="@{/terms}">利用規約</a></div>
	  <div><a th:href="@{/legal}">特定商取引法に基づく表記</a></div>
      <div><a th:href="@{/listing-apply}">掲載申し込みはこちら</a></div>
    </div>
  </main>

  
  <!-- Contactフロート -->
  <div th:replace="~{fragments/contact-float :: contactFloat}"></div>
  
  <!-- 共通フッター -->
  <footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

  <!-- 共通Cookie同意 -->
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

  
  <!-- ===============================
       js呼び出し
  ================================== -->
  <!-- Contactフロートjs -->
  <script th:src="@{/js/contact-float.js}"></script>
  
  
</body>
</html>
