<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブログ投稿 | チームBe不動産</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/staff-post.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="staff">
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

  <main id="contents" class="post-wrap">
    <h2>ブログ投稿</h2>

    <p class="hint">
      タイトルと本文は必須です。画像はURL指定（任意）です。
    </p>

    <div class="msg-error" th:if="${error}" th:text="${error}"></div>

    <div class="form-card">
      <form th:action="@{/staff/blog}" method="post">
        <div class="form-row">
          <label for="title">タイトル</label>
          <input id="title" name="title" type="text" maxlength="80"
                 th:value="${title}">
        </div>

        <div class="form-row">
          <label for="body">本文</label>
          <textarea id="body" name="body" maxlength="2000"
                    th:text="${body}"></textarea>
        </div>

        <div class="form-row">
          <label for="imageUrl">画像URL（任意）</label>
          <input id="imageUrl" name="imageUrl" type="text" maxlength="300"
                 placeholder="例：https://example.com/photo.jpg"
                 th:value="${imageUrl}">
          <div class="hint">※空欄なら画像なしで投稿されます。<br>
            ※↓お試し用URLです↓<br>
            「https://kunnren202511.com/images/staff.jpg」<br>
            「https://kunnren202511.com/images/blogtest01.png」<br>
            「https://kunnren202511.com/images/graphic2.png」
          </div>
        </div>

        <div class="form-actions">
          <a th:href="@{/staff/blog(page=1)}">← 一覧に戻る</a>
          <button type="submit">投稿する</button>
        </div>
      </form>
    </div>
  </main>

  <footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>
</body>
</html>
