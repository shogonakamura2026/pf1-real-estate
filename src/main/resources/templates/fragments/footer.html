<footer th:fragment="footer" class="site-footer" xmlns:th="http://www.thymeleaf.org">
  <section class="site-footer__card">
    <div class="site-footer__pagetop-wrap">
      <a id="pagetop" href="#top" class="site-footer__pagetop">▲ ページの先頭へ戻る</a>
    </div>
    <div class="site-footer__body">
      <div class="site-footer__info">
        <div class="site-footer__site-name">
          <span th:text="${siteName}">チームb不動産</span>
        </div>
        <dl class="site-footer__info-list">
          <dt class="site-footer__term">住所</dt>
          <dd class="site-footer__desc">沖縄県那覇市X-X-X</dd>
          <dt class="site-footer__term">電話</dt>
          <dd class="site-footer__desc"><a href="tel:098-XXX-XXX" class="site-footer__tel">098-XXX-XXX</a></dd>
          <dt class="site-footer__term">営業時間</dt>
          <dd class="site-footer__desc">9:00～17:00</dd>
          <dt class="site-footer__term">休業日</dt>
          <dd class="site-footer__desc">月曜日、年末年始、旧盆</dd>
        </dl>
	
      </div>
      <div class="site-footer__links-block">
        <div class="site-footer__links-title">リンク</div>
        <nav class="site-footer__links" aria-label="フッターリンク">
          <a th:href="@{/privacy}" class="site-footer__link">プライバシーポリシー</a>
          <a th:href="@{/external-transmission}" class="site-footer__link">外部送信ポリシー</a>
          <a th:href="@{/terms}" class="site-footer__link">利用規約</a>
          <a th:href="@{/sitemap}" class="site-footer__link">サイトマップ</a>
		  <a th:href="@{/legal}" class="site-footer__link">特定商取引法に基づく表記</a>
          <a th:href="@{/listing-apply}" class="site-footer__link">掲載申し込みはこちら</a>
        </nav>
        <div class="site-footer__note">※ お問い合わせの返信は営業時間内に順次対応いたします。</div>
      </div>
    </div>
	<div class="site-footer__copyright">
		  © <span th:text="${thisYear} ?: 2026">2026</span>
		  <span th:text="${siteName} ?: 'チームBe不動産'">チームBe不動産</span>
		  All Rights Reserved.
		</div>
  </section>
</footer>
