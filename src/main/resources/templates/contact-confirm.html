<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ内容の確認 | チームBe不動産</title>

  <!-- ===============================
    共通CSS
  ================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/contact-confirm.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="contact-confirm">
  <!-- ===============================
       共通ヘッダー
  ================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

  <!-- ===============================
       パンくず
  ================================== -->
  <div id="path">
    <ol>
      <li><a th:href="@{/}">ホーム</a></li>
      <li><a th:href="@{/contact}">お問い合わせ</a></li>
      <li>確認</li>
    </ol>
  </div>

  <!-- ===============================
       メイン
  ================================== -->
  <div id="main">
    <article>
      <h1>お問い合わせ内容の確認</h1>
      <p>内容をご確認のうえ、問題なければ「送信確定」を押してください。</p>

      <div class="row">
        <div class="k">お名前</div>
        <div class="v" th:text="${contactForm.name}">山田 太郎</div>
      </div>

      <div class="row">
        <div class="k">メール</div>
        <div class="v" th:text="${contactForm.mail}">example@email.com</div>
      </div>

      <div class="row">
        <div class="k">電話</div>
        <div class="v" th:text="${#strings.isEmpty(contactForm.tel) ? '' : contactForm.tel}">090-1234-5678</div>
      </div>

      <div class="row">
        <div class="k">希望連絡方法</div>
        <div class="v" th:text="${contactForm.contactMethod}">email</div>
      </div>

      <div class="row">
        <div class="k">お問い合わせ種別</div>
        <div class="v" th:text="${contactForm.inquiryType}">document</div>
      </div>

      <div class="row" th:if="${contactForm.propertyId != null and !#strings.isEmpty(contactForm.propertyId)}">
        <div class="k">物件ID / 物件名</div>
        <div class="v">
          <span th:text="${contactForm.propertyId}">1</span>
          <span th:if="${contactForm.propertyName != null and !#strings.isEmpty(contactForm.propertyName)}"
                th:text="' / ' + ${contactForm.propertyName}">
            / サンプル物件
          </span>
        </div>
      </div>

      <div class="row">
        <div class="k">希望エリア</div>
        <div class="v" th:text="${contactForm.area}">那覇市</div>
      </div>

      <div class="row">
        <div class="k">ご予算</div>
        <div class="v" th:text="${contactForm.budget}">3万</div>
      </div>

      <div class="row">
        <div class="k">間取り</div>
        <div class="v" th:text="${contactForm.layout}">1K</div>
      </div>

      <div class="row">
        <div class="k">入居 / 引渡し時期</div>
        <div class="v" th:text="${contactForm.moveIn}"></div>
      </div>

      <div class="row">
        <div class="k">内見希望（第1）</div>
        <div class="v">
          <span th:text="${contactForm.date1}"></span>
          <span th:if="${contactForm.time1 != null and !#strings.isEmpty(contactForm.time1)}"
                th:text="' ' + ${contactForm.time1}"></span>
        </div>
      </div>

      <div class="row">
        <div class="k">内見希望（第2）</div>
        <div class="v">
          <span th:text="${contactForm.date2}"></span>
          <span th:if="${contactForm.time2 != null and !#strings.isEmpty(contactForm.time2)}"
                th:text="' ' + ${contactForm.time2}"></span>
        </div>
      </div>

      <div class="row">
        <div class="k">内見希望（第3）</div>
        <div class="v">
          <span th:text="${contactForm.date3}"></span>
          <span th:if="${contactForm.time3 != null and !#strings.isEmpty(contactForm.time3)}"
                th:text="' ' + ${contactForm.time3}"></span>
        </div>
      </div>

      <div class="row">
        <div class="k">お問い合わせ詳細</div>
        <div class="v multiline" th:text="${contactForm.message}">お問い合わせ内容</div>
      </div>

      <div class="actions">
        <!-- 戻って修正 -->
        <form th:action="@{/contact}" method="post" th:object="${contactForm}">
          <input type="hidden" th:field="*{propertyId}">
          <input type="hidden" th:field="*{propertyName}">
          <input type="hidden" th:field="*{inquiryType}">
          <input type="hidden" th:field="*{name}">
          <input type="hidden" th:field="*{mail}">
          <input type="hidden" th:field="*{tel}">
          <input type="hidden" th:field="*{contactMethod}">
          <input type="hidden" th:field="*{area}">
          <input type="hidden" th:field="*{budget}">
          <input type="hidden" th:field="*{layout}">
          <input type="hidden" th:field="*{moveIn}">
          <input type="hidden" th:field="*{date1}">
          <input type="hidden" th:field="*{time1}">
          <input type="hidden" th:field="*{date2}">
          <input type="hidden" th:field="*{time2}">
          <input type="hidden" th:field="*{date3}">
          <input type="hidden" th:field="*{time3}">
          <input type="hidden" th:field="*{message}">
          <input type="hidden" th:field="*{consent}">
          <button type="submit" class="btn-sub">戻って修正</button>
        </form>

        <!-- 送信確定 -->
        <form th:action="@{/contact/complete}" method="post" th:object="${contactForm}">
          <input type="hidden" th:field="*{propertyId}">
          <input type="hidden" th:field="*{propertyName}">
          <input type="hidden" th:field="*{inquiryType}">
          <input type="hidden" th:field="*{name}">
          <input type="hidden" th:field="*{mail}">
          <input type="hidden" th:field="*{tel}">
          <input type="hidden" th:field="*{contactMethod}">
          <input type="hidden" th:field="*{area}">
          <input type="hidden" th:field="*{budget}">
          <input type="hidden" th:field="*{layout}">
          <input type="hidden" th:field="*{moveIn}">
          <input type="hidden" th:field="*{date1}">
          <input type="hidden" th:field="*{time1}">
          <input type="hidden" th:field="*{date2}">
          <input type="hidden" th:field="*{time2}">
          <input type="hidden" th:field="*{date3}">
          <input type="hidden" th:field="*{time3}">
          <input type="hidden" th:field="*{message}">
          <input type="hidden" th:field="*{consent}">
          <button type="submit" class="btn">送信確定</button>
        </form>
      </div>
    </article>
  </div>

  <!-- Contactフロート -->
  <div th:replace="~{fragments/contact-float :: contactFloat}"></div>

  <!-- 共通フッター -->
  <footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

  <!-- 共通Cookie同意 -->
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

  <!-- Contactフロートjs -->
  <script th:src="@{/js/contact-float.js}"></script>
</body>
</html>
