<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ確認 | チームBe不動産</title>

  <!-- =====================================================
       共通CSS
       ===================================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/contact-confirm.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="contact">

  <!-- =====================================================
       共通ヘッダー / 共通ナビ
       ===================================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

  <!-- =====================================================
       パンくず
       ===================================================== -->
  <div id="path">
    <ol>
      <li><a th:href="@{/}">ホーム</a></li>
      <li>お問い合わせ（確認）</li>
    </ol>
  </div>

  <!-- =====================================================
       メインコンテンツ
       ===================================================== -->
  <div id="main">
    <article>
      <h1>お問い合わせ内容の確認</h1>
      <p>内容をご確認のうえ、問題なければ「送信確定」を押してください。</p>

      <div class="row">
        <div class="k">お名前</div>
        <div class="v" th:text="${contactForm.name}"></div>
      </div>

      <div class="row">
        <div class="k">メール</div>
        <div class="v" th:text="${contactForm.mail}"></div>
      </div>

      <div class="row">
        <div class="k">電話</div>
        <div class="v" th:text="${contactForm.tel}"></div>
      </div>

      <div class="row">
        <div class="k">希望連絡方法</div>
        <div class="v" th:text="${contactForm.contactMethod}"></div>
      </div>

      <div class="row">
        <div class="k">お問い合わせ種別</div>
        <div class="v" th:text="${contactForm.inquiryType}"></div>
      </div>

      <div class="row">
        <div class="k">物件ID / 物件名</div>
        <div class="v" th:text="${contactForm.propertyId}"></div>
      </div>

      <div class="row">
        <div class="k">希望エリア</div>
        <div class="v" th:text="${contactForm.area}"></div>
      </div>

      <div class="row">
        <div class="k">ご予算</div>
        <div class="v" th:text="${contactForm.budget}"></div>
      </div>

      <div class="row">
        <div class="k">間取り</div>
        <div class="v" th:text="${contactForm.layout}"></div>
      </div>

      <div class="row">
        <div class="k">入居 / 引渡し時期</div>
        <div class="v" th:text="${contactForm.moveIn}"></div>
      </div>

      <div class="row">
        <div class="k">内見希望（第1）</div>
        <div class="v">
          <span th:text="${contactForm.date1}"></span>
          <span th:text="${contactForm.time1}"></span>
        </div>
      </div>

      <div class="row">
        <div class="k">内見希望（第2）</div>
        <div class="v">
          <span th:text="${contactForm.date2}"></span>
          <span th:text="${contactForm.time2}"></span>
        </div>
      </div>

      <div class="row">
        <div class="k">内見希望（第3）</div>
        <div class="v">
          <span th:text="${contactForm.date3}"></span>
          <span th:text="${contactForm.time3}"></span>
        </div>
      </div>

      <div class="row">
        <div class="k">お問い合わせ詳細</div>
        <div class="v" th:text="${contactForm.message}"></div>
      </div>

      <div class="actions">

        <!-- 戻って修正 -->
        <form th:action="@{/contact}" th:object="${contactForm}" method="post">
          <input type="hidden" th:field="*{name}">
          <input type="hidden" th:field="*{mail}">
          <input type="hidden" th:field="*{tel}">
          <input type="hidden" th:field="*{contactMethod}">
          <input type="hidden" th:field="*{inquiryType}">
          <input type="hidden" th:field="*{propertyId}">
          <input type="hidden" th:field="*{area}">
          <input type="hidden" th:field="*{budget}">
          <input type="hidden" th:field="*{layout}">
          <input type="hidden" th:field="*{moveIn}">
          <input type="hidden" th:field="*{date1}">
          <input type="hidden" th:field="*{time1}">
          <input type="hidden" th:field="*{date2}">
          <input type="hidden" th:field="*{time2}">
          <input type="hidden" th:field="*{date3}">
          <input type="hidden" th:field="*{time3}">
          <input type="hidden" th:field="*{message}">
          <input type="hidden" th:field="*{consent}">
          <button class="btn-sub" type="submit">戻って修正</button>
        </form>

        <!-- 送信確定 -->
        <form th:action="@{/contact/complete}" th:object="${contactForm}" method="post">
          <input type="hidden" th:field="*{name}">
          <input type="hidden" th:field="*{mail}">
          <input type="hidden" th:field="*{tel}">
          <input type="hidden" th:field="*{contactMethod}">
          <input type="hidden" th:field="*{inquiryType}">
          <input type="hidden" th:field="*{propertyId}">
          <input type="hidden" th:field="*{area}">
          <input type="hidden" th:field="*{budget}">
          <input type="hidden" th:field="*{layout}">
          <input type="hidden" th:field="*{moveIn}">
          <input type="hidden" th:field="*{date1}">
          <input type="hidden" th:field="*{time1}">
          <input type="hidden" th:field="*{date2}">
          <input type="hidden" th:field="*{time2}">
          <input type="hidden" th:field="*{date3}">
          <input type="hidden" th:field="*{time3}">
          <input type="hidden" th:field="*{message}">
          <input type="hidden" th:field="*{consent}">
          <button class="btn" type="submit">送信確定</button>
        </form>

      </div>
    </article>
  </div>

  <!-- =====================================================
       共通フッター / Cookie
       ===================================================== -->
  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

</body>
</html>
