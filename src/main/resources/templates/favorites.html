<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お気に入り | チームBe不動産</title>

  <!-- ===============================
    共通CSS
  ================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/favorites.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">


</head>

<body id="favorites">
	<!-- ===============================
	     共通ヘッダー
	================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>  
  <div th:replace="~{fragments/global-nav :: globalNav}"></div> 
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>
  

<!-- ===============================
     メイン
================================ -->
<main class="container">
  <div class="header-row">
    <h2 class="page-title">お気に入り</h2>

    <div class="actions-top">
      <a class="btn outline" th:href="@{/properties}">物件一覧へ</a>
      <button class="btn danger" type="button" onclick="clearFavorites()">全削除</button>
    </div>
  </div>

  <div id="emptyBox" class="empty empty-box">
    お気に入りはまだありません。物件一覧から追加してみましょう。
  </div>

  <section id="favoritesGrid" class="grid" aria-label="お気に入り一覧"></section>
</main>

<!-- Contactフロート -->
<div th:replace="~{fragments/contact-float :: contactFloat}"></div>

  <!-- 共通フッター -->
<footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

  <!-- 共通Cookie同意 -->
<div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

<!-- ===============================
     お気に入り（localStorage）制御
     ------------------------------------------------
     ★ history.html 寄りの命名に寄せる
     - KEY → FAV_KEY
     - getList/setList → loadJsonArray/saveJsonArray
================================ -->
<script>
  // =========================================================
  // localStorage key
  // =========================================================
  const FAV_KEY = "favorites";

  // =========================================================
  // 共通：JSON配列を安全に読み書き
  // ---------------------------------------------------------
  // history.html の loadJsonArray / saveJsonArray と命名統一
  // =========================================================
  function loadJsonArray(key){
    try { return JSON.parse(localStorage.getItem(key) || "[]"); }
    catch(e){ return []; }
  }

  function saveJsonArray(key, list){
    localStorage.setItem(key, JSON.stringify(list));
  }

  // =========================================================
  // 初回描画
  // =========================================================
  document.addEventListener("DOMContentLoaded", render);

  // =========================================================
  // 描画：お気に入りカード一覧
  // =========================================================
  function render(){
    const list = loadJsonArray(FAV_KEY);
    const grid = document.getElementById("favoritesGrid");
    const emptyBox = document.getElementById("emptyBox");

    grid.innerHTML = "";

    if (!list.length){
      emptyBox.style.display = "block";
      return;
    }
    emptyBox.style.display = "none";

    list.forEach(item => {
      grid.appendChild(createCard(item));
    });
  }

  // =========================================================
  // カード生成
  // =========================================================
  function createCard(item){
    const card = document.createElement("article");
    card.className = "card";

    const id = Number(item.id);

    const thumb = document.createElement("a");
    thumb.className = "thumb";
    thumb.href = `/properties/${id}`;

    const img = document.createElement("img");
    img.alt = "物件画像";
    img.src = `/images/${item.imageUrl || ""}`;

    thumb.appendChild(img);
    card.appendChild(thumb);

    const body = document.createElement("div");
    body.className = "body";

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = item.title || "（タイトル未設定）";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `家賃：${Number(item.price || 0).toLocaleString()}円 / 間取り：${item.layout || "-"}`;

    const actions = document.createElement("div");
    actions.className = "actions";

    const detail = document.createElement("a");
    detail.className = "btn outline";
    detail.textContent = "物件詳細";
    detail.href = `/properties/${id}`;

    const del = document.createElement("button");
    del.className = "btn danger";
    del.type = "button";
    del.textContent = "削除";
    del.addEventListener("click", () => removeFavorite(id));

    actions.appendChild(detail);
    actions.appendChild(del);

    body.appendChild(title);
    body.appendChild(meta);
    body.appendChild(actions);

    card.appendChild(body);
    return card;
  }

  // =========================================================
  // 個別削除
  // =========================================================
  function removeFavorite(id){
    const next = loadJsonArray(FAV_KEY).filter(x => Number(x.id) !== Number(id));
    saveJsonArray(FAV_KEY, next);
    render();
  }

  // =========================================================
  // 全削除
  // =========================================================
  function clearFavorites(){
    if (!confirm("お気に入りをすべて削除しますか？")) return;
    localStorage.removeItem(FAV_KEY);
    render();
  }
</script>

<!-- ===============================
     js呼び出し
================================== -->
<!-- Contactフロートjs -->
<script th:src="@{/js/contact-float.js}"></script>


</body>
</html>
