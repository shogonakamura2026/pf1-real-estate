<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お気に入り | チームBe不動産</title>

  <!-- ===============================
    共通CSS
  ================================== -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/page/favorites.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}" media="screen and (max-width: 767px)">
</head>

<body id="favorites">
  <!-- ===============================
       共通ヘッダー
  ================================== -->
  <div th:replace="~{fragments/header :: siteHeader}"></div>
  <div th:replace="~{fragments/global-nav :: globalNav}"></div>
  <div th:replace="~{fragments/quick-nav :: quickNav}"></div>

  <!-- =========================================================
       メイン
       ---------------------------------------------------------
       このページの役割
       1) localStorage に保存された「お気に入り」を読む
       2) カード一覧として表示する
       3) 個別削除 / 全削除を行う
       
       設計メモ
       - お気に入りへ追加する処理自体は、一覧ページ・詳細ページ側で実施
       - favorites.html は「表示と削除」に専念
       - 保存形式は history.html とできるだけ揃える
       
       保存データの想定
       {
         id: 物件ID,
         title: 物件名,
         price: 家賃（円）,
         layout: 間取り,
         imageUrl: "chintai/house1.jpg" のような相対パス
       }
  ========================================================= -->
  <main class="container">
    <!-- =======================================================
         ページ上部
         -------------------------------------------------------
         - ページタイトル
         - 物件一覧へ戻る導線
         - お気に入り全削除ボタン
    ======================================================== -->
    <div class="header-row">
      <h2 class="page-title">お気に入り</h2>

      <div class="actions-top">
        <a class="btn outline" th:href="@{/properties}">物件一覧へ</a>
        <button class="btn danger" type="button" onclick="clearFavorites()">全削除</button>
      </div>
    </div>

    <!-- =======================================================
         空状態表示
         -------------------------------------------------------
         お気に入りが1件もない場合だけ表示するメッセージ
         JSで display を出し分ける
    ======================================================== -->
    <div id="emptyBox" class="empty empty-box">
      お気に入りはまだありません。物件一覧から追加してみましょう。
    </div>

    <!-- =======================================================
         お気に入りカード描画エリア
         -------------------------------------------------------
         JSで localStorage から読んだお気に入りをここへ描画する
    ======================================================== -->
    <section id="favoritesGrid" class="grid" aria-label="お気に入り一覧"></section>
  </main>

  <!-- Contactフロート -->
  <div th:replace="~{fragments/contact-float :: contactFloat}"></div>

  <!-- 共通フッター -->
  <footer id="footer" th:replace="~{fragments/footer :: footer}"></footer>

  <!-- 共通Cookie同意 -->
  <div th:replace="~{fragments/cookie-consent :: cookieConsent}"></div>

  <!-- ===============================
       お気に入り（localStorage）制御
       ---------------------------------------------------------
       方針
       - history.html と命名ルールをできるだけ統一
       - DBではなく localStorage を使った簡易管理
       - imageUrl は "chintai/house1.jpg" のような相対パス想定
       - 表示時に "/images/" を前につけて画像URLを完成させる
  ================================== -->
  <script>
    // =========================================================
    // localStorage key
    // ---------------------------------------------------------
    // favorites 配列の保存先キー
    // =========================================================
    const FAV_KEY = "favorites";

    // =========================================================
    // 共通：JSON配列を安全に読み書き
    // ---------------------------------------------------------
    // localStorage は文字列でしか保存できないため、
    // 配列は JSON.stringify / JSON.parse で扱う
    //
    // 壊れたJSONが入っていても画面が落ちないように
    // try/catch で空配列を返す
    // =========================================================
    function loadJsonArray(key){
      try {
        return JSON.parse(localStorage.getItem(key) || "[]");
      } catch(e) {
        return [];
      }
    }

    function saveJsonArray(key, list){
      localStorage.setItem(key, JSON.stringify(list));
    }

    // =========================================================
    // 表示用：金額を万円表記へ変換
    // ---------------------------------------------------------
    // 例:
    // 78000  -> 7.8万円
    // 100000 -> 10万円
    // 0/null -> なし
    //
    // 一覧・詳細・履歴ページと表示の雰囲気を揃えるため、
    // お気に入りページでも万円表示へ寄せる
    // =========================================================
    function formatYenToMan(value){
      const num = Number(value || 0);

      if (!num) {
        return "なし";
      }

      const man = num / 10000;
      return Number.isInteger(man) ? `${man}万円` : `${man.toFixed(1)}万円`;
    }

    // =========================================================
    // 初回描画
    // ---------------------------------------------------------
    // DOM読み込み完了後にお気に入り一覧を表示する
    // =========================================================
    document.addEventListener("DOMContentLoaded", render);

    // =========================================================
    // 描画：お気に入りカード一覧
    // ---------------------------------------------------------
    // 1) localStorage から favorites を読む
    // 2) 一覧描画エリアを初期化
    // 3) 0件なら emptyBox を表示
    // 4) データがあればカードを生成して並べる
    // =========================================================
    function render(){
      const list = loadJsonArray(FAV_KEY);
      const grid = document.getElementById("favoritesGrid");
      const emptyBox = document.getElementById("emptyBox");

      // 再描画前に一旦中身を空にする
      grid.innerHTML = "";

      // データ0件なら空メッセージ表示
      if (!list.length){
        emptyBox.style.display = "block";
        return;
      }

      // データありなら空メッセージ非表示
      emptyBox.style.display = "none";

      // 各お気に入りデータからカードを生成して追加
      list.forEach(item => {
        grid.appendChild(createCard(item));
      });
    }

    // =========================================================
    // カード生成
    // ---------------------------------------------------------
    // お気に入り1件分のカードDOMを作る
    //
    // 表示内容
    // - メイン画像
    // - 物件名
    // - 家賃 / 間取り
    // - 詳細ページへのリンク
    // - 削除ボタン
    // =========================================================
    function createCard(item){
      const card = document.createElement("article");
      card.className = "card";

      const id = Number(item.id);

      // =======================================================
      // サムネイル画像
      // -------------------------------------------------------
      // imageUrl は相対パス想定
      // 例: "chintai/house1.jpg"
      //
      // 表示時に "/images/" を前につけて完成URLにする
      // 例: "/images/chintai/house1.jpg"
      // =======================================================
      const thumb = document.createElement("a");
      thumb.className = "thumb";
      thumb.href = `/properties/${id}`;

      const img = document.createElement("img");
      img.alt = "物件画像";
      img.src = `/images/${item.imageUrl || ""}`;

      thumb.appendChild(img);
      card.appendChild(thumb);

      // =======================================================
      // カード本文エリア
      // -------------------------------------------------------
      // title / meta / action ボタン群をまとめる
      // =======================================================
      const body = document.createElement("div");
      body.className = "body";

      // 物件名
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = item.title || "（タイトル未設定）";

      // 補足情報
      // 家賃は万円表示へ変換して見やすくする
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `家賃：${formatYenToMan(item.price)} / 間取り：${item.layout || "-"}`;

      // 操作ボタン群
      const actions = document.createElement("div");
      actions.className = "actions";

      // 詳細ページへ
      const detail = document.createElement("a");
      detail.className = "btn outline";
      detail.textContent = "物件詳細";
      detail.href = `/properties/${id}`;

      // 個別削除
      const del = document.createElement("button");
      del.className = "btn danger";
      del.type = "button";
      del.textContent = "削除";
      del.addEventListener("click", () => removeFavorite(id));

      actions.appendChild(detail);
      actions.appendChild(del);

      body.appendChild(title);
      body.appendChild(meta);
      body.appendChild(actions);

      card.appendChild(body);
      return card;
    }

    // =========================================================
    // 個別削除
    // ---------------------------------------------------------
    // 指定 id のお気に入りを配列から除外して再描画する
    // =========================================================
    function removeFavorite(id){
      const next = loadJsonArray(FAV_KEY)
        .filter(x => Number(x.id) !== Number(id));

      saveJsonArray(FAV_KEY, next);
      render();
    }

    // =========================================================
    // 全削除
    // ---------------------------------------------------------
    // 確認ダイアログの後、favorites キーごと削除して再描画
    // =========================================================
    function clearFavorites(){
      if (!confirm("お気に入りをすべて削除しますか？")) return;

      localStorage.removeItem(FAV_KEY);
      render();
    }
  </script>

  <!-- ===============================
       js呼び出し
  ================================== -->
  <!-- Contactフロートjs -->
  <script th:src="@{/js/contact-float.js}"></script>
</body>
</html>
